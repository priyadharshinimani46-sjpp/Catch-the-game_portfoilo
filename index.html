<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catch the Star</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #001f3f, #0074D9);
      color: white;
    }
    #game-area {
      position: relative;
      width: 600px;
      height: 400px;
      margin: 20px auto;
      background: #111;
      border: 2px solid #fff;
      overflow: hidden;
    }
    .star {
      position: absolute;
      font-size: 2rem;
      cursor: pointer;
      color: gold;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Catch the Star ⭐</h1>
  <p>Click the star before it disappears!</p>
  <div id="game-area"></div>
  <p id="score">Score: 0</p>
  <button id="start">Start Game</button>
  <button id="stop">Stop Game</button>

  <script>
    const gameArea = document.getElementById("game-area");
    const scoreDisplay = document.getElementById("score");
    const startBtn = document.getElementById("start");
    const stopBtn = document.getElementById("stop");

    let score = 0;
    let gameInterval = null;

    function spawnStar() {
      const star = document.createElement("div");
      star.textContent = "⭐";
      star.classList.add("star");

      // Random position
      const x = Math.random() * (gameArea.clientWidth - 40);
      const y = Math.random() * (gameArea.clientHeight - 40);
      star.style.left = `${x}px`;
      star.style.top = `${y}px`;

      // Add click event
      star.addEventListener("click", () => {
        score++;
        scoreDisplay.textContent = `Score: ${score}`;
        star.remove();
      });

      gameArea.appendChild(star);

      // Remove after 2 seconds if not clicked
      setTimeout(() => {
        if (gameArea.contains(star)) {
          star.remove();
        }
      }, 2000);
    }

    // Start game
    startBtn.addEventListener("click", () => {
      if (!gameInterval) {
        score = 0;
        scoreDisplay.textContent = `Score: ${score}`;
        gameInterval = setInterval(spawnStar, 1000);
      }
    });

    // Stop game
    stopBtn.addEventListener("click", () => {
      clearInterval(gameInterval);
      gameInterval = null;
    });
  </script>
</body>
</html>
